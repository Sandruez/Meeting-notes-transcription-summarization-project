services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: fireflies-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    plan: free
    envVars:
      - key: NVIDIA_API_KEY
        sync: false          # set manually in Render dashboard
      - key: DATABASE_URL
        value: sqlite:///./fireflies.db
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # set to your Render frontend URL after deploy

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: fireflies-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false          # set to your Render backend URL after deploy
